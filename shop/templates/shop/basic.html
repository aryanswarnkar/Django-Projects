<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">

    <title>{% block title%} {% endblock %}</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }
        .nav-link {
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .cart-btn {
            background-color: #ff6b6b;
            border: none;
            font-weight: 600;
            border-radius: 50px;
            padding: 8px 20px;
            transition: 0.3s;
        }
        .cart-btn:hover {
            background-color: #ff4757;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: auto;
            background-color: #343a40;
            color: #ccc;
            padding: 20px 0;
        }
        {% block css %} {% endblock %}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/shop"><i class="fas fa-shopping-cart text-warning"></i> MY Awesome Cart</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active"><a class="nav-link" href="/shop">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/shop/about">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="/shop/tracker">Tracker</a></li>
                <li class="nav-item"><a class="nav-link" href="/blog">Blog</a></li>
                <li class="nav-item"><a class="nav-link" href="/shop/contact">Contact Us</a></li>
            </ul>
            <form method='get' action='/shop/search/' class="form-inline my-2 my-lg-0">
                <div class="input-group">
                    <input class="form-control" type="search" placeholder="Search products..." name="search" id="search" style="border-radius: 50px 0 0 50px;">
                    <div class="input-group-append">
                        <button class="btn btn-outline-light" type="submit" style="border-radius: 0 50px 50px 0;"><i class="fas fa-search"></i></button>
                    </div>
                </div>
            </form>
            <button type="button" class="btn btn-primary text-white mx-3 cart-btn" id="popcart" data-container="body" data-toggle="popover" data-placement="bottom" data-html="true">
                <i class="fas fa-shopping-bag"></i> Cart <span class="badge badge-light ml-1" id="cart">0</span>
            </button>
        </div>
    </div>
</nav>

<main class="flex-grow-1">
    {% block body %} {% endblock %}
</main>

<footer class="footer text-center">
    <div class="container">
        <p class="mb-0">&copy; 2024 MY Awesome Cart. All Rights Reserved.</p>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.3.1.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.6/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/js/bootstrap.min.js"></script>
{% block js %} {% endblock %}
</body>
</html>
