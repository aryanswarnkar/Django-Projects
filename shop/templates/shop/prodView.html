{% extends 'shop/basic.html' %}

{% block title%} {{product.product_name}} - My Awesome Cart{% endblock %}

{% block css %}
<style>
    .product-view-card {
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        padding: 30px;
        margin-top: 40px;
    }
    .product-img {
        border-radius: 10px;
        object-fit: cover;
        width: 100%;
        max-height: 400px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .price-tag {
        font-size: 2rem;
        font-weight: 700;
        color: #28a745;
    }
    .action-btns .btn {
        border-radius: 50px;
        padding: 10px 30px;
        font-weight: 600;
        text-transform: uppercase;
    }
</style>
{% endblock %}

{% block body %}
<div class="container">
    <div class="product-view-card">
        <div class="row">
            <div class="col-md-5 text-center mb-4 mb-md-0">
                <img src="/media/{{product.image}}" class="product-img" alt="{{product.product_name}}">
            </div>

            <div class="col-md-7 d-flex flex-column justify-content-center">
                <h2 class="font-weight-bold">{{product.product_name}}</h2>
                <hr>
                <p class="price-tag mb-3">₹{{product.price}}</p>
                <p class="text-muted lead" style="font-size: 1.1rem;">{{product.desc}}</p>

                <div class="action-btns mt-4">
                    <button class="btn btn-warning mr-2 shadow-sm text-dark"><i class="fas fa-bolt"></i> Buy Now</button>
                    <button id="pr{{product.id}}" class="btn btn-primary shadow-sm cart"><i class="fas fa-cart-plus"></i> Add To Cart</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
{% endblock %}
